name: Release to NPM
on:
  push:
    tags: ["v*.*.*"]
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
      - name: Validate tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "ERROR: git tag $TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi
      - run: npm run build
      - run: npm test
      - name: Publish (prerelease -> beta tag, stable -> latest)
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if [[ "$VERSION" == *-* ]]; then
            echo "Prerelease $VERSION -> npm dist-tag 'beta'"
            npm publish --access public --tag beta
          else
            echo "Stable $VERSION -> npm dist-tag 'latest'"
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
